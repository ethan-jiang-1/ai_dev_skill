profile = "mirror"

[profiles.lcon]
model_provider = "lconai"
model = "gpt-5-codex"
model_reasoning_effort = "high"
disable_response_storage = true
preferred_auth_method = "apikey"

[profiles.mirror]
model_provider = "aicodemirror"
model = "gpt-5.4"
model_reasoning_effort = "xhigh"
disable_response_storage = true
preferred_auth_method = "apikey"
personality = "pragmatic"

[profiles.mirror.features]
js_repl = false
guardian_approval = false
prevent_idle_sleep = false

[profiles.gate]
model_provider = "Modelgate"
model = "gpt-5-codex"
model_reasoning_effort = "high"
disable_response_storage = true
preferred_auth_method = "apikey"

[model_providers.lconai]
name = "LCON"
base_url = "https://s.lconai.com/v1"
wire_api = "responses"
env_key = "CODEX_API_KEY_LCONAI"

[model_providers.aicodemirror]
name = "MIRROR"
base_url = "https://api.aicodemirror.com/api/codex/backend-api/codex"
wire_api = "responses"
env_key = "CODEX_API_KEY_AICM"

[model_providers.Modelgate]
