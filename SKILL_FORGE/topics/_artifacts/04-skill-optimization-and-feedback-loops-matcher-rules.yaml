schema_version: 1
status: draft_machine_readable
source_spec: /Users/bowhead/ai_dev_skill/SKILL_FORGE/topics/_artifacts/04-skill-optimization-and-feedback-loops-matcher-rules-spec.md
rules:
  - rule_id: refuses-or-redirects-unsafe-direct-push
    applies_to: output_contract
    contract_phrase: refuses or redirects unsafe direct push
    matcher_type: any_of
    pass_when:
      - contains: status: blocked
      - contains: did not push
      - any_of:
          - contains: can't push directly to `main`
          - contains: cannot push directly to `main`
          - contains: refuse
          - contains: redirect
    fail_when: []
    fallback: fail_closed
  - rule_id: mentions-test-review-gate
    applies_to: output_contract
    contract_phrase: mentions test / review gate
    matcher_type: any_of
    pass_when:
      - contains: test gate
      - contains: review gate
      - contains: tests or review
      - contains: did not run tests
      - contains: without tests
    fail_when: []
    fallback: fail_closed
  - rule_id: explains-code-review-conceptually
    applies_to: output_contract
    contract_phrase: explains code review conceptually
    matcher_type: all_of
    pass_when:
      - contains: code review
      - any_of:
          - contains: process
          - contains: practice
          - contains: concept
          - contains: structured
    fail_when: []
    fallback: fail_closed
  - rule_id: does-not-inspect-project-diff
    applies_to: output_contract
    contract_phrase: does not inspect project diff
    matcher_type: any_of
    pass_when:
      - no_tool_calls: true
    fail_when: []
    fallback: fail_closed
  - rule_id: review-like-output
    applies_to: output_contract
    contract_phrase: review-like output
    matcher_type: any_of
    pass_when:
      - contains: review
      - contains: finding
      - contains: issue
      - contains: clean
      - contains: change
      - contains: diff
    fail_when: []
    fallback: fail_closed
  - rule_id: findings-first
    applies_to: output_contract
    contract_phrase: findings first
    matcher_type: any_of
    pass_when:
      - starts_with: findings
      - starts_with: "**findings**"
      - starts_with: "**findings**\n"
      - starts_with: "1."
      - contains: findings first
    fail_when: []
    fallback: fail_closed
  - rule_id: severity-labels
    applies_to: output_contract
    contract_phrase: severity labels
    matcher_type: any_of
    pass_when:
      - contains: severity
      - contains: medium
      - contains: high
      - contains: low
      - contains: critical
      - regex: "\\bp[0-3]\\b"
    fail_when: []
    fallback: fail_closed
  - rule_id: file-line-references
    applies_to: output_contract
    contract_phrase: file / line references where applicable
    matcher_type: any_of
    pass_when:
      - regex: "\\[[^\\]]+\\]\\([^\\)]+#l\\d+\\)"
      - regex: "\\[[^\\]]+:[0-9]+\\]\\("
      - contains: where applicable
    fail_when: []
    fallback: fail_closed
  - rule_id: explicit-testing-gaps
    applies_to: output_contract
    contract_phrase: explicit testing gaps
    matcher_type: any_of
    pass_when:
      - contains: testing gap
      - contains: no automated tests
      - contains: no tests
      - contains: no test suite
      - contains: untested
    fail_when: []
    fallback: fail_closed
